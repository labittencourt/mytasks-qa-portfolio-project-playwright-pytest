<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — QA Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>📝 My Tasks</h1>
      <p class="subtitle">QA Portfolio Project</p>
    </header>

    <div class="auth-card">
      <h2>Login</h2>

      <p id="success-msg" class="success-msg" data-testid="success-msg"></p>

      <div class="field">
        <input
          type="email"
          id="username-input"
          placeholder="Email"
          data-testid="login-username"
        />
        <p id="username-error" class="field-error" data-testid="login-username-error"></p>
      </div>

      <div class="field">
        <div class="password-wrapper">
          <input
            type="password"
            id="password-input"
            placeholder="Password"
            data-testid="login-password"
          />
          <button type="button" id="toggle-password" class="toggle-password" data-testid="toggle-password" aria-label="Show password">👁</button>
        </div>
        <p id="password-error" class="field-error" data-testid="login-password-error"></p>
      </div>

      <p id="error-msg" class="error-msg" data-testid="error-msg"></p>

      <button id="login-btn" data-testid="login-btn" disabled>Login</button>

      <p class="auth-switch">
        Don't have an account?
        <a href="register.html" data-testid="go-register-link">Register</a>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
