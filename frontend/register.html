<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — QA Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>📝 My Tasks</h1>
      <p class="subtitle">QA Portfolio Project</p>
    </header>

    <div class="auth-card">
      <h2>Create account</h2>

      <div class="field">
        <input
          type="email"
          id="username-input"
          placeholder="Email"
          data-testid="register-username"
        />
        <p id="username-error" class="field-error" data-testid="register-username-error"></p>
      </div>

      <div class="field">
        <div class="password-wrapper">
          <input
            type="password"
            id="password-input"
            placeholder="Password (min. 6 characters, with letters and numbers)"
            data-testid="register-password"
          />
          <button type="button" id="toggle-password" class="toggle-password" data-testid="toggle-password" aria-label="Show password">👁</button>
        </div>
        <p id="password-error" class="field-error" data-testid="register-password-error"></p>
      </div>

      <div class="field">
        <div class="password-wrapper">
          <input
            type="password"
            id="confirm-password-input"
            placeholder="Confirm password"
            data-testid="register-confirm-password"
          />
          <button type="button" id="toggle-confirm-password" class="toggle-password" data-testid="toggle-confirm-password" aria-label="Show password">👁</button>
        </div>
        <p id="confirm-password-error" class="field-error" data-testid="register-confirm-password-error"></p>
      </div>

      <p id="error-msg" class="error-msg" data-testid="error-msg"></p>

      <button id="register-btn" data-testid="register-btn" disabled>Register</button>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html" data-testid="go-login-link">Login</a>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="register.js"></script>
</body>
</html>
